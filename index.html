        /* Custom User-Submitted Color Palette */

            --palette-light-sage: #a3dab6;  /* Soft Mint/Sage Green Input Fields */
            --palette-sand: #e6d8bc;        /* Creamy Sand Text Accent Backdrop */
            --palette-olive-yellow: #d5d671;/* Lime Accent Tone */
            --palette-red-orange: #d6583c;  /* Pop Red-Orange Shoelace Ribbon & CTA */
            --palette-charcoal: #010101;    /* Deep Jet Black for Text */
            --font-family: 'Fredoka', 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--palette-bg);
            color: var(--palette-charcoal);
            font-family: var(--font-family);
            margin: 0;
            padding: 15px 20px 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
        }

        /* Combined Code Header Layout Section with custom yellow smiley fills */
        .brand-header-block {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 580px;
            margin: 15px auto 5px auto;
        }

        .brand-title-text {
            font-size: 42px;
            font-weight: 700;
            color: var(--palette-red-orange);
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0;
            line-height: 1;
            text-shadow: 2px 2px 0px var(--palette-charcoal);
        }

        .smiley-graphic {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        /* Shoelace Header Graphic Layout Section */
        .shoelace-header-container {
            width: 100%;
            max-width: 580px;
            height: 160px;
            margin-bottom: 5px;
            position: relative;
            overflow: visible;
        }

        /* Continuous Text Flow Base Typography Styles */
        .marquee-segment {
            font-family: 'Fredoka', sans-serif;
            font-size: 11px;
            font-weight: 700;
            fill: #ffffff;
            letter-spacing: 0.8px;
            white-space: nowrap;
        }

        /* Headline Promo Area styling */
        .headline-promo {
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin: 25px auto 25px auto;
        }

        .headline-promo h2 {
            font-size: 23px;
            color: #2b558f; 
            margin: 0 0 6px 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.2px;
        }

        .headline-promo p {
            font-size: 14px;
            color: var(--palette-dark-green);
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            line-height: 1.2;
        }

        /* Main Container Box following deep-green style framing */
        .web-container {
            background-color: var(--palette-dark-green);
            border: 4px solid var(--palette-charcoal);
            border-radius: 24px;
            max-width: 520px;
            width: 100%;
            padding: 30px 25px;
            text-align: left;
            box-shadow: 8px 8px 0px var(--palette-charcoal);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Hidden Layer Confetti Overlay Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Layout Form Styling Blocks */
        .form-group {
            margin-bottom: 20px;
            background: var(--palette-sand);
            padding: 18px;
            border-radius: 16px;
            border: 3px solid var(--palette-charcoal);
            box-shadow: 4px 4px 0px var(--palette-charcoal);
            position: relative;
        }

        label {
            display: block;
            color: var(--palette-charcoal);
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Mode Toggle Button Styling */
        .mode-toggle-btn {
            background-color: var(--palette-light-sage);
            color: var(--palette-charcoal);
            border: 2px solid var(--palette-charcoal);
            border-radius: 20px;
            padding: 5px 12px;
            font-family: var(--font-family);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 13px;
            box-shadow: 2px 2px 0px var(--palette-charcoal);
        }
        .mode-toggle-btn:hover {
            background-color: #ffffff;
        }

        /* Custom Toggle Switches */
        .unit-toggle {
            display: flex;
            gap: 24px;
        }
        
        .unit-toggle label {
            text-transform: none;
            letter-spacing: normal;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0;
        }

        .unit-toggle input[type="radio"] {
            accent-color: var(--palette-red-orange);
            width: 18px;
            height: 18px;
            margin: 0;
        }

        /* Dropdowns & User Input Controls */
        input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            background-color: #ffffff;
            color: var(--palette-charcoal);
            font-size: 16px;
            border: 3px solid var(--palette-charcoal);
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            font-family: var(--font-family);
            font-weight: 600;
        }

        .input-row-group {
            display: flex;
            gap: 12px;
        }

        /* Action Button */
        .calc-btn {
            background-color: #e3de43; 
            color: var(--palette-charcoal);
            font-size: 20px;
            font-weight: 700;
            padding: 18px;
            border: 3px solid var(--palette-charcoal);
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-shadow: 5px 5px 0px var(--palette-charcoal);
            font-family: var(--font-family);
            letter-spacing: 0.5px;
            text-align: center;
            text-transform: uppercase;
        }

        .calc-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--palette-charcoal);
        }

        .calc-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px var(--palette-charcoal);
        }

        /* Dynamic Shoe Output Reveal Section */
        #result-box {
            margin-top: 25px;
            padding: 24px;
            border-radius: 16px;
            background-color: #ffffff;
            border: 3px solid var(--palette-charcoal);
            box-shadow: 5px 5px 0px var(--palette-charcoal);
            display: none;
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .size-header {
            color: var(--palette-dark-green);
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .size-output {
            color: var(--palette-red-orange);
            font-size: 52px;
            font-weight: 700;
            margin: 8px 0;
            letter-spacing: -0.5px;
        }

        /* Affiliate Link Box Layout Styling */
        .affiliate-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 12px;
            background-color: var(--palette-dark-green);
            color: #ffffff !important;
            padding: 12px 28px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            border: 2px solid var(--palette-charcoal);
            font-size: 15px;
            box-shadow: 3px 3px 0px var(--palette-charcoal);
        }

        .cart-icon-svg {
            width: 18px;
            height: 18px;
            margin-right: 12px; 
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: inline-block;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

    // Tracking state variable for input modes
    let isHouseholdMode = false;

    function toggleMeasurementMode() {
        isHouseholdMode = !isHouseholdMode;
        
        const rulerContainer = document.getElementById('ruler-input-container');
        const itemContainer = document.getElementById('item-input-container');
        const unitGroup = document.getElementById('unit-group-box');
        const toggleBtn = document.getElementById('mode-toggle');
        const labelText = document.getElementById('main-input-label');

        if (isHouseholdMode) {
            rulerContainer.style.display = "none";
            itemContainer.style.display = "flex";
            unitGroup.style.opacity = "0.3"; 
            unitGroup.style.pointerEvents = "none";
            toggleBtn.innerText = "Use Ruler";
            labelText.innerText = "2. Select Foot Fit Scale";
        } else {
            rulerContainer.style.display = "block";
            itemContainer.style.display = "none";
            unitGroup.style.opacity = "1";
            unitGroup.style.pointerEvents = "auto";
            toggleBtn.innerText = "No Ruler?";
            labelText.innerText = "2. Enter Foot Length";
        }
    }

    function updatePlaceholder() {
        const unit = document.querySelector('input[name="unit"]:checked').value;
        document.getElementById('footSize').placeholder = unit === 'in' ? 'e.g., 6.75' : 'e.g., 17.1';
    }

    function calculate90sSize() {
        const brand = document.getElementById('brand').value;
        const resultBox = document.getElementById('result-box');
        let cmLength = 0;

        if (!isHouseholdMode) {
            // Path A: Calculating raw value via manual numeric type inputs
            const unit = document.querySelector('input[name="unit"]:checked').value;
            const rawInput = parseFloat(document.getElementById('footSize').value);

            if (isNaN(rawInput) || rawInput <= 0) {
                alert("Please enter a valid number for foot length!");
                return;
            }
            cmLength = unit === 'in' ? rawInput * 2.54 : rawInput;
        } else {
            // Path B: Option B background mathematical translation logic
            const objectType = document.getElementById('household-object').value;
            const fractionMultiplier = parseFloat(document.getElementById('household-fraction').value);
            
            let objectInchesBase = 0;
            if (objectType === 'dollar') objectInchesBase = 6.14;   // Standard US Currency length tracking
            if (objectType === 'credit') objectInchesBase = 3.37;   // Standard ISO ID Card specification
            if (objectType === 'paper') objectInchesBase = 11.0;    // Standard US Letter width dimension
            
            let totalCalculatedInches = objectInchesBase * fractionMultiplier;
            cmLength = totalCalculatedInches * 2.54; // Map back safely into metric processing standard
        }

        let bufferedCm = cmLength + 0.3; 
        const chart = sizeData[brand];
        let finalSize = "N/A";

        for (let i = 0; i < chart.length; i++) {
            if (bufferedCm <= chart[i].max) {
                finalSize = chart[i].sz;
                break;
            }
        }

        if (finalSize === "N/A") {
            alert("Out of range: Your child's feet match adult sizing options!");
            return;
        }

        document.getElementById('brand-result-text').innerText = `Recommended size for ${brand}:`;
        document.getElementById('final-size').innerText = finalSize;
        
        const textTarget = document.getElementById('affiliate-text');
        textTarget.innerText = `Shop ${finalSize} ${brand} Shoes`;
        
        const affBtn = document.getElementById('affiliate-btn');
        affBtn.href = `https://www.amazon.com/s?k=kids+${brand}+shoes+size+${finalSize}&tag=YOURAFFILIATEID-20`; 

        resultBox.style.display = "block";
        initConfetti();
    }

    // Canvas Confetti Render Module
    let currentAnimationId = null;

    function initConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;

        if (currentAnimationId) {
            cancelAnimationFrame(currentAnimationId);
        }

        let particles = [];
        const colors = ['#497856', '#a3dab6', '#e6d8bc', '#d5d671', '#d6583c', '#010101'];

        for (let i = 0; i < 220; i++) {
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2 + 30,
                width: Math.random() * 5 + 4,
                height: Math.random() * 3 + 2.5,
                color: colors[Math.floor(Math.random() * colors.length)],
                speedX: (Math.random() - 0.5) * 16,
                speedY: (Math.random() - 0.78) * 20,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.25,
                gravity: 0.35,
                opacity: 1
            });
        }

        function animate() {
            if (particles.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, index) => {
                p.x += p.speedX;
                p.y += p.speedY;
                p.speedY += p.gravity;
                p.rotation += p.rotationSpeed;
                p.opacity -= 0.012;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.opacity);
                ctx.fillRect(-p.width / 2, -p.height / 2, p.width, p.height);
                ctx.restore();

                if (p.opacity <= 0 || p.y > canvas.height + 20) {
                    particles.splice(index, 1);
                }
            });

            ctx.globalAlpha = 1.0;
            currentAnimationId = requestAnimationFrame(animate);
        }
        animate();
    }
